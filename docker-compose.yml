services:
  # БАЗА ДАННЫХ
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: auth_user
      POSTGRES_PASSWORD: auth_password
      POSTGRES_DB: auth_db
    ports:
      - "5433:5432" # Если установлен локально PostgresSQL на порту 5432 используем порт 5433
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auth_user -d auth_db"]
      interval: 3s
      timeout: 3s
      retries: 3

  # СЕРВИС API
  app:
    build: .
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      db-seed:
        condition: service_completed_successfully

  # СЕРВИС ДЛЯ ЗАПОЛНЕНИЯ БД
  db-seed:
    build: .
    command: ["sh", "-c", "alembic upgrade head && python -m src.scripts.seed"]
    env_file: .env
    depends_on:
      db:
        condition: service_healthy

volumes:
  pg_data:

